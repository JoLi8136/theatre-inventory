<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre Inventory</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <link rel="shortcut icon" href="img/favicon.ico">
    <meta name="apple-mobile-web-app-title" content="MyWebSite">
    <link rel="manifest" href="img/site.webmanifest">
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div id="header-top">
            <h1 style="margin-bottom: clamp(15px, 3vh, 25px);">Theatre Closet Catalogue</h1>
            <nav id="group-nav">
                <button onclick="setGroup(null)" id="btn-all">All Groups</button>
                <button onclick="setGroup('ensemble')" id="btn-ensemble">Ensemble</button>
                <button onclick="setGroup('musicalforum')" id="btn-musicalforum">Musical Forum</button>
                <button onclick="setGroup('btc')" id="btn-btc">BTC</button>
            </nav>
        </div>
        <div id="filter-bar">
            <input id="search" type="text" placeholder="🔍 Search by name or tags...">
            <select id="type-filter" class="filter"></select>
            <select id="category-filter" class="filter"></select>
            <div id="availability-filter">
                <button onclick="setStatus(null)" id="status-all" class="status-btn active">ALL</button>
                <button onclick="setStatus('available')" id="available-filter" class="status-btn avail">+</button>
                <button onclick="setStatus('unavailable')"id="unavailable-filter" class="status-btn unavail">x</button>
            </div>
        </div>
    </header>
    
    <main>
        <div id="inventory-container"></div>
        <div id="loading-msg">
            <div class="spinner"></div>
            <p><i>it may take a bit to load...</i></p>
        </div>
    </main>

    <div id="item-modal" class="modal">
        <div class="modal-content">
            <span id="close">&times;</span>
            <div id="modal-details"></div>
        </div>
    </div>

    <div id="input-modal">
        <div id="input-modal-box">
            <h3 id="input-modal-title"></h3>
            <div id="input-modal-fields"></div>
            <div style="display:flex;gap:8px;margin-top:16px">
                <button id="input-modal-confirm">Confirm</button>
                <button id="input-modal-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
